# Source of truth for nango-openclaw-plugin tools.
# Edit this file, then run: npm run generate
#
# Call path through ai-assistant-nango-proxy:
#   {NANGO_PROXY_URL}/api/v1/{projectId}/evo-claws/{evoclawId}/proxy/{key}/{endpoint}
# where {endpoint} is relative to upstreamBase (Nango resolves the real upstream URL).

providers:
  - key: yandex-id
    displayName: Yandex ID
    family: yandex
    hint: Yandex profile, login, email, avatar
    upstreamBase: https://login.yandex.ru
    aliases: [yandex]
    examples:
      - method: GET
        endpoint: info
        query: format=json
        description: Get connected user profile

  - key: yandex-disk
    displayName: Yandex Disk
    family: yandex
    kind: disk
    hint: Full Yandex Disk CRUD via REST (cloud-api.yandex.net)
    upstreamBase: https://cloud-api.yandex.net
    docs: https://yandex.com/dev/disk/api/concepts/about.html
    notes: >
      Connecting yandex-disk enables dedicated tools (info/list/get/mkdir/upload/upload_link/download_link/copy/move/delete/publish/unpublish/trash_*).
      Calls go through Nango proxy to Disk REST API with OAuth.
      All Disk paths must be absolute and start with / (e.g. /folder/file.pdf). Prefer upload over upload_link.
    tools:
      - name: info
        description: Disk quota and meta (GET /v1/disk)
      - name: list
        description: List folder resources (GET /v1/disk/resources?path=)
      - name: get
        description: Get file/folder meta (GET /v1/disk/resources?path=)
      - name: files
        description: Flat list of all files (GET /v1/disk/resources/files)
      - name: last_uploaded
        description: Recently uploaded files
      - name: mkdir
        description: Create folder (PUT /v1/disk/resources?path=)
      - name: upload
        description: >
          Upload a local file to Yandex Disk (gets upload URL then PUT bytes).
          Pass destination path (must start with /) and localPath on the EvoClaw host.
      - name: upload_link
        description: >
          Get one-shot upload URL only (GET /v1/disk/resources/upload?path=).
          Prefer nango_yandex_disk_upload for full upload. path must start with /.
      - name: download_link
        description: Get download URL (GET /v1/disk/resources/download?path=). path must start with /.
      - name: copy
        description: Copy resource (POST /v1/disk/resources/copy)
      - name: move
        description: Move/rename resource (POST /v1/disk/resources/move)
      - name: delete
        description: Delete to trash or permanently (DELETE /v1/disk/resources)
      - name: publish
        description: Publish resource (PUT …/publish)
      - name: unpublish
        description: Unpublish resource (PUT …/unpublish)
      - name: trash_list
        description: List trash (GET /v1/disk/trash/resources)
      - name: trash_restore
        description: Restore from trash (PUT …/trash/resources/restore)
      - name: trash_empty
        description: Empty trash (DELETE /v1/disk/trash/resources)
    examples:
      - method: GET
        endpoint: v1/disk
        description: Disk meta
      - method: GET
        endpoint: v1/disk/resources
        query: path=/
        description: List root
      - method: PUT
        endpoint: v1/disk/resources
        query: path=/folder
        description: Create folder
      - method: DELETE
        endpoint: v1/disk/resources
        query: path=/file.txt
        description: Move to trash

  - key: yandex-mail
    displayName: Yandex Mail
    family: yandex
    kind: mail
    hint: Read and send Yandex Mail via IMAP/SMTP XOAUTH2 (mail API on nango-proxy)
    upstreamBase: "imap.yandex.com / smtp.yandex.com (via /mail/*)"
    notes: >
      Not REST. Connecting yandex-mail enables nango_yandex_mail_list|get|send.
      Proxy routes: GET /mail/list, GET /mail/get?uid=, POST /mail/send.
      User must enable in Yandex Mail → Settings → Email clients:
      "From the imap.yandex.com server via IMAP" and "App passwords and OAuth tokens".
      Then reconnect yandex-mail if IMAP was disabled at connect time.
    tools:
      - name: list
        description: List recent messages in a mailbox (default INBOX)
      - name: get
        description: Get a message body by IMAP UID
      - name: send
        description: Send an email via SMTP XOAUTH2
    examples:
      - method: GET
        endpoint: mail/list
        query: limit=20
        description: List latest 20 messages
      - method: GET
        endpoint: mail/get
        query: uid=123
        description: Read message by UID
      - method: POST
        endpoint: mail/send
        description: Send email (JSON body to/subject/body)

  - key: yandex-calendar
    displayName: Yandex Calendar
    family: yandex
    kind: calendar
    hint: Full Yandex Calendar CRUD via CalDAV (caldav.yandex.ru + OAuth)
    upstreamBase: "caldav.yandex.ru (via /calendar/*)"
    notes: >
      Not plain REST. Connecting yandex-calendar enables
      nango_yandex_calendar_list_calendars|list_events|get_event|create_event|update_event|delete_event.
      Proxy routes under /calendar/* speak CalDAV with OAuth token (scope calendar:all).
    tools:
      - name: list_calendars
        description: List user calendars (CalDAV PROPFIND)
      - name: list_events
        description: List events in a time range (CalDAV REPORT)
      - name: get_event
        description: Get one event by href (.ics)
      - name: create_event
        description: Create event (CalDAV PUT .ics)
      - name: update_event
        description: Update event by uid (CalDAV PUT .ics)
      - name: delete_event
        description: Delete event by href (CalDAV DELETE)
    examples:
      - method: GET
        endpoint: calendar/calendars
        description: List calendars
      - method: GET
        endpoint: calendar/events
        query: start=2026-07-01&end=2026-08-01
        description: List events
      - method: POST
        endpoint: calendar/events
        description: Create event JSON {summary,start,end,…}

